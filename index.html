<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkTree | Modern</title>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            overflow-x: hidden;
            align-items: center; 
        }

        /* --- Desktop (PC) Navigation --- */
        .top-nav {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .btn-account {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            text-decoration: none;
            font-size: 14px;
        }

        header { 
            padding: 100px 20px 40px 20px; 
            text-align: center;
        }

        h1 { 
            font-weight: 800; 
            font-size: 4rem; /* Big for PC */
            margin: 0; 
            letter-spacing: -2px; 
            background: linear-gradient(to bottom, #ffffff, #b0b0b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { 
            opacity: 0.7; 
            font-size: 1.2rem; 
            margin-top: 15px;
            max-width: 600px;
            line-height: 1.6;
        }

        /* --- Hero Images Grid --- */
        .hero-images { 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
            margin-top: 40px; 
            padding: 0 20px;
        }

        .example-img { 
            width: 160px; 
            height: 250px; 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            transition: 0.4s ease;
            background-size: cover;
            background-position: center;
        }

        /* Styles for images */
        .img-1 { background-image: url('https://cdn.discordapp.com/attachments/1101409428944724000/1493333153899872338/Style_-_1.png?ex=69de9660&is=69dd44e0&hm=19c853d6832b86333070c16ed841cd9958d626f796d9ba0bb58a9c8f7ec96559&'); }
        .img-2 { background-image: url('https://cdn.discordapp.com/attachments/1101409428944724000/1493334445846040749/Style_-_2.png?ex=69de9794&is=69dd4614&hm=0562d27843d1220980ac89d77333a7a66bbac1fb64ea67bd1e99915f9a771065&'); }
        .img-3 { background-image: url('https://cdn.discordapp.com/attachments/1101409428944724000/1493335823217852487/Style_-_3.png?ex=69de98dd&is=69dd475d&hm=efb26972d5638242fd4fc7266b6c438fecb3d001fff9fd0e31c6efe4ff704947&'); }

        .btn-glass {
            margin: 60px 0;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 20px 50px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        /* ======================================================
           MOBILE SWITCH (Screens smaller than 768px)
           ====================================================== */
        @media (max-width: 768px) {
            header {
                padding: 80px 20px 20px 20px;
            }

            h1 {
                font-size: 2.8rem; /* Smaller title for mobile */
            }

            p {
                font-size: 1rem;
                max-width: 90%;
            }

            .hero-images {
                gap: 12px;
                flex-wrap: nowrap; /* Keep them in a row */
                overflow-x: auto;  /* Allow sideways swipe on phone */
                width: 100vw;
                padding: 10px 40px;
                -webkit-overflow-scrolling: touch;
            }

            .example-img {
                width: 130px; /* Slimmer images for phone */
                height: 200px;
                flex-shrink: 0; /* Stop them from squishing */
            }

            .btn-glass {
                width: 85%; /* Wide button for easy thumb tapping */
                padding: 18px 0;
                font-size: 16px;
                margin: 40px 0;
            }

            .top-nav {
                top: 15px;
                right: 15px;
            }

            .btn-account {
                padding: 8px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="btn-account" id="accountBtn" onclick="handleAccount()">Create Account</button>
    </div>

    <header>
        <span id="welcome-text"></span>
        <h1>LinkTree</h1>
        <p>A premium home for your social presence. Elegant, fast, and completely yours.</p>
    </header>
    
    <div class="hero-images">
        <div class="example-img img-1"></div>
        <div class="example-img img-2"></div>
        <div class="example-img img-3"></div>
    </div>
    
    <button class="btn-glass" onclick="window.location.href='gmail-step.html'">Build Your Link Tree</button>

    <script>
        // ... (Keep your existing script for accounts)
    </script>
</body>
</html>
