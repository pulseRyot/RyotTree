<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1: Auth</title>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        .back-link {
            display: block;
            text-align: left;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-link:hover {
            color: white;
            transform: translateX(-3px);
        }

        h2 { 
            margin-top: 0; 
            font-size: 1.8rem; 
            letter-spacing: -0.5px;
        }

        p {
            opacity: 0.8;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin: 20px 0;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { 
            border-color: rgba(255, 255, 255, 0.5); 
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 30px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-glass:hover { 
            background: rgba(255, 255, 255, 0.2); 
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .glass-card { padding: 30px 20px; }
            h2 { font-size: 1.5rem; }
            p { font-size: 0.9rem; }
            input { font-size: 14px; padding: 12px; }
            .btn-glass { padding: 12px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <a href="index.html" class="back-link">← Back to Home</a>

        <h2 id="statusTitle">Verify Identity</h2>
        <p id="statusDesc">Enter your Gmail to continue.</p>
        
        <div id="inputContainer">
            <input type="email" id="email" placeholder="email@gmail.com">
            <button class="btn-glass" onclick="nextPage()">Continue</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const savedEmail = localStorage.getItem('tempUserEmail');

            // If the user is already logged in and we have their email...
            if (isLoggedIn === 'true' && savedEmail) {
                // Update the UI to show they are being redirected
                document.getElementById('statusTitle').innerText = "Authenticating...";
                document.getElementById('statusDesc').innerText = "Welcome back! Redirecting you...";
                document.getElementById('inputContainer').style.display = "none";

                // Short delay for a smoother feel before jumping to styles
                setTimeout(() => {
                    window.location.href = 'styles.html';
                }, 800);
            }
        };

        function nextPage() {
            const val = document.getElementById('email').value;
            if(val.includes('@')) {
                localStorage.setItem('tempUserEmail', val);
                window.location.href = 'styles.html';
            } else { 
                alert("Please enter a valid Gmail address."); 
            }
        }
    </script>
</body>
</html>
