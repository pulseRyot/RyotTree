<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkTree | Modern</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            overflow-x: hidden;
            align-items: center; 
        }

        /* --- Navigation --- */
        .top-nav {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-profile {
            display: none; /* Shown via JS when logged in */
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 6px 18px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: 0.3s ease;
        }

        .user-profile:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .avatar-circle {
            width: 32px;
            height: 32px;
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            overflow: hidden;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .username-display { 
            font-weight: 600; 
            font-size: 14px; 
            letter-spacing: 0.5px;
        }

        /* --- Content --- */
        header { padding: 100px 20px 40px 20px; text-align: center; }
        h1 { font-weight: 800; font-size: 4rem; margin: 0; letter-spacing: -2px; background: linear-gradient(to bottom, #ffffff, #b0b0b0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { opacity: 0.7; font-size: 1.2rem; margin-top: 15px; max-width: 600px; line-height: 1.6; text-align: center;}

        /* --- Hero Images / Gallery --- */
        .hero-images { display: flex; justify-content: center; gap: 25px; margin-top: 40px; padding: 0 20px; }
        .example-img { 
            width: 160px; 
            height: 250px; 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            transition: 0.4s ease;
            background-size: cover;
            background-position: center;
        }

        .example-img:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .img-1 { background-image: url('https://cdn.discordapp.com/attachments/1101409428944724000/1493333153899872338/Style_-_1.png?ex=69de9660&is=69dd44e0&hm=19c853d6832b86333070c16ed841cd9958d626f796d9ba0bb58a9c8f7ec96559&'); }
        .img-2 { background-image: url('https://cdn.discordapp.com/attachments/1101409428944724000/1493334445846040749/Style_-_2.png?ex=69de9794&is=69dd4614&hm=0562d27843d1220980ac89d77333a7a66bbac1fb64ea67bd1e99915f9a771065&'); }
        .img-3 { background-image: url('https://cdn.discordapp.com/attachments/1101409428944724000/1493335823217852487/Style_-_3.png?ex=69de98dd&is=69dd475d&hm=efb26972d5638242fd4fc7266b6c438fecb3d001fff9fd0e31c6efe4ff704947&'); }

        .btn-glass { margin: 60px 0; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); color: white; padding: 20px 50px; font-size: 18px; font-weight: 700; border-radius: 16px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-glass:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-3px); }

        @media (max-width: 768px) {
            h1 { font-size: 2.8rem; }
            .hero-images { gap: 12px; overflow-x: auto; width: 100vw; padding: 10px 40px; }
            .example-img { width: 130px; height: 200px; flex-shrink: 0; }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <div id="userProfile" class="user-profile" onclick="goToSettings()">
            <div id="userInitials" class="avatar-circle">?</div>
            <div id="userName" class="username-display">User</div>
        </div>
    </div>

    <header>
        <h1>LinkTree</h1>
        <p>A premium home for your social presence. Elegant, fast, and completely yours.</p>
    </header>
    
    <div class="hero-images">
        <div class="example-img img-1"></div>
        <div class="example-img img-2"></div>
        <div class="example-img img-3"></div>
    </div>
    
    <button class="btn-glass" onclick="window.location.href='gmail-step.html'">Build Your Link Tree</button>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDjcNWpd7-zN4l--bdz_6NviRUthNnbZ5U",
            authDomain: "linktree-a41ae.firebaseapp.com",
            projectId: "linktree-a41ae",
            storageBucket: "linktree-a41ae.firebasestorage.app",
            messagingSenderId: "829854289113",
            appId: "1:829854289113:web:e625d84c546ed06b18c2c8"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            const userProfile = document.getElementById('userProfile');
            const userName = document.getElementById('userName');
            const userInitials = document.getElementById('userInitials');

            if (user) {
                userProfile.style.display = "flex";

                // Initial UI fallback using email data
                userName.innerText = user.email.split('@')[0];
                userInitials.innerText = user.email.charAt(0).toUpperCase();

                // Start real-time listener for the user document
                db.collection('users').doc(user.uid).onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();

                        // Update username if it exists in Firestore
                        if (data.username) {
                            userName.innerText = data.username;
                        }

                        // Update avatar: Image if exists, else first letter of username/email
                        if (data.profilePic) {
                            userInitials.innerHTML = `<img src="${data.profilePic}" alt="PFP">`;
                            userInitials.style.background = "none";
                        } else {
                            // If we have a custom username, use its first letter
                            const firstChar = data.username ? data.username.charAt(0) : user.email.charAt(0);
                            userInitials.innerText = firstChar.toUpperCase();
                            userInitials.style.background = "linear-gradient(45deg, #ff00cc, #3333ff)";
                        }
                    }
                }, (error) => {
                    console.error("Firestore Error:", error);
                });
            } else {
                userProfile.style.display = "none";
            }
        });

        function goToSettings() {
            if (auth.currentUser) {
                window.location.href = 'settings.html';
            }
        }
    </script>
</body>
</html>
