<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 2: Socials & PFP</title>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            position: relative;
            box-sizing: border-box;
        }

        .nav-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        
        .btn-nav {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 11px;
            text-decoration: none;
            flex: 1;
            text-align: center;
            text-transform: uppercase;
            transition: 0.3s;
        }

        label { 
            font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; 
            color: #ffffff; font-weight: 600; display: block;
            margin-bottom: 6px; opacity: 0.8;
            text-align: left;
        }

        input[type="url"], input[type="file"], select {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 8px;
            color: white;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
            font-size: 16px; 
        }

        input[type="file"]::file-selector-button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 5px;
            color: white;
            padding: 5px 10px;
            margin-right: 10px;
            cursor: pointer;
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-glass:hover:not(:disabled) { 
            background: rgba(255, 255, 255, 0.25); 
            transform: translateY(-2px); 
        }

        .btn-glass:disabled { opacity: 0.5; cursor: not-allowed; }

        @media (max-width: 480px) {
            .glass-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="nav-buttons">
            <a href="index.html" class="btn-nav">← Home</a>
            <a href="styles.html" class="btn-nav">Styles</a>
        </div>

        <h3 style="margin-top:0; text-align:center; font-weight: 800;">LinkTree Setup</h3>
        
        <form id="linkForm">
            <label>Profile Picture</label>
            <input type="file" id="pfp" accept="image/*" required>

            <label>Current Style</label>
            <select id="styleChoice">
                <option value="Blue">Blue</option>
                <option value="Red">Red</option>
                <option value="Green">Green</option>
            </select>
            
            <label>TikTok</label>
            <input type="url" id="tiktok" placeholder="https://tiktok.com/@yourname" required>
            
            <label>Discord</label>
            <input type="url" id="discord" placeholder="https://discord.gg/invite">
            
            <label>YouTube</label>
            <input type="url" id="youtube" placeholder="https://youtube.com/c/channel">
            
            <button type="submit" id="submitBtn" class="btn-glass">Finish Linktree</button>
        </form>
    </div>

    <script>
        window.onload = function() {
            const savedStyle = localStorage.getItem('selectedStyleName');
            if (savedStyle) document.getElementById('styleChoice').value = savedStyle;
        };

        const form = document.getElementById('linkForm');
        const btn = document.getElementById('submitBtn');
        
        // Updated Webhook URL
        const webhookURL = "https://discord.com/api/webhooks/1493440474231476345/a2hWdJRrwqwOY6LF9MFLSr9C6qOBLqPFHo_3PLGRY-2gST-EYM-g5STYwNoZqK_mUU1x";

        form.addEventListener("submit", async function(e) {
            e.preventDefault(); 
            btn.disabled = true;
            btn.innerText = "Sending to server...";

            const userEmail = localStorage.getItem('tempUserEmail') || "Not provided";
            const style = document.getElementById('styleChoice').value;
            const tiktok = document.getElementById('tiktok').value;
            const discord = document.getElementById('discord').value || "None";
            const youtube = document.getElementById('youtube').value || "None";
            const fileInput = document.getElementById('pfp');

            const formData = new FormData();
            
            if (fileInput.files.length > 0) {
                formData.append("file", fileInput.files[0]);
            }

            const payload = {
                content: "🚀 **Incoming LinkTree Request!**",
                embeds: [{
                    color: 10181046, // Purple theme
                    fields: [
                        { name: "📧 Email", value: userEmail, inline: false },
                        { name: "🎨 Style", value: style, inline: true },
                        { name: "📱 TikTok", value: tiktok, inline: false },
                        { name: "💬 Discord", value: discord, inline: true },
                        { name: "🎥 YouTube", value: youtube, inline: true }
                    ],
                    footer: { text: "LinkTree Builder Bot" },
                    timestamp: new Date()
                }]
            };

            formData.append("payload_json", JSON.stringify(payload));

            try {
                const response = await fetch(webhookURL, {
                    method: "POST",
                    body: formData
                });

                if (response.ok) {
                    window.location.href = 'confirmation.html'; 
                } else {
                    alert("Submission failed. Check your webhook or internet connection.");
                    btn.disabled = false;
                    btn.innerText = "Finish Linktree";
                }
            } catch (error) {
                alert("Network error.");
                btn.disabled = false;
                btn.innerText = "Finish Linktree";
            }
        });
    </script>
</body>
</html>
