<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 2: Socials</title>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px; /* Essential for mobile spacing */
            box-sizing: border-box;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px; /* PC Width */
            position: relative;
            box-sizing: border-box;
        }

        .nav-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        
        .btn-nav {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 11px;
            text-decoration: none;
            flex: 1;
            text-align: center;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-nav:hover { background: rgba(255, 255, 255, 0.15); }

        label { 
            font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; 
            color: #ffffff; font-weight: 600; display: block;
            margin-bottom: 6px; opacity: 0.8;
            text-align: left;
        }

        select, input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 8px;
            color: white;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
            font-size: 16px; /* Prevents iOS auto-zoom on focus */
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-glass:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-2px); }
        .btn-glass:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- MOBILE SWITCH --- */
        @media (max-width: 480px) {
            .glass-card {
                padding: 30px 20px;
            }
            
            h3 { font-size: 1.2rem; }
            
            input, select {
                padding: 10px;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="nav-buttons">
            <a href="index.html" class="btn-nav">← Home</a>
            <a href="styles.html" class="btn-nav">Styles</a>
        </div>

        <h3 style="margin-top:0; text-align:center; font-weight: 800;">LinkTree Setup</h3>
        
        <form id="linkForm">
            <input type="hidden" name="Customer_Email" id="hiddenEmail">
            
            <label>Choose Your Style</label>
            <select name="Selected_Style" id="styleChoice">
                <option value="Blue">Blue</option>
                <option value="Red">Red</option>
                <option value="Green">Green</option>
            </select>
            
            <label>TikTok</label>
            <input type="url" name="TikTok" id="tiktok" placeholder="https://tiktok.com/@yourname" required>
            
            <label>Discord</label>
            <input type="url" name="Discord" id="discord" placeholder="https://discord.gg/invite">
            
            <label>YouTube</label>
            <input type="url" name="YouTube" id="youtube" placeholder="https://youtube.com/c/channel">
            
            <button type="submit" id="submitBtn" class="btn-glass">Finish Linktree</button>
        </form>
    </div>

    <script>
        window.onload = function() {
            document.getElementById('hiddenEmail').value = localStorage.getItem('tempUserEmail') || "Unknown";
            const savedStyle = localStorage.getItem('selectedStyleName');
            if (savedStyle) document.getElementById('styleChoice').value = savedStyle;
        };

        const form = document.getElementById('linkForm');
        const btn = document.getElementById('submitBtn');

        form.addEventListener("submit", async function(e) {
            e.preventDefault(); 
            
            btn.disabled = true;
            btn.innerText = "Saving...";

            const formData = new FormData(form);

            try {
                const response = await fetch("https://formspree.io/f/meevqloo", {
                    method: "POST",
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    window.location.href = 'confirmation.html'; 
                } else {
                    alert("Submission error. Try again.");
                    btn.disabled = false;
                    btn.innerText = "Finish Linktree";
                }
            } catch (error) {
                alert("Network error.");
                btn.disabled = false;
                btn.innerText = "Finish Linktree";
            }
        });
    </script>
</body>
</html>
