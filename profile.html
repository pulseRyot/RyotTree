<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing</title>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 60px;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        h2 { font-size: 2.2rem; margin-bottom: 10px; letter-spacing: -1px; }
        
        p { font-size: 1.1rem; line-height: 1.5; }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- MOBILE SWITCH (Screens smaller than 600px) --- */
        @media (max-width: 600px) {
            .glass-card {
                padding: 40px 20px;
            }

            h2 {
                font-size: 1.6rem;
            }

            p {
                font-size: 0.95rem;
            }

            .loader {
                width: 30px;
                height: 30px;
                margin: 20px auto;
            }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>We're on it!</h2>
        <p>Submission successful. Redirecting home shortly.</p>
        <p style="opacity:0.6; font-size: 0.85rem;">Check your Gmail within 24 hours.</p>
        <div class="loader"></div>
    </div>
    
    <script>
        // Redirect home after 5 seconds
        setTimeout(() => { window.location.href = 'index.html'; }, 5000);
    </script>
</body>
</html>
