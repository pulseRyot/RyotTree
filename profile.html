<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Profile | LinkTree</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 { margin-top: 0; font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
        p { opacity: 0.7; font-size: 0.95rem; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; margin-left: 5px; display: block; margin-bottom: 5px; opacity: 0.9; }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.5); }

        .btn-glass {
            background: #ffffff;
            color: #0f0c29;
            padding: 15px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            border: none;
            margin-top: 15px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-glass:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2); background: #f0f0f0; }
        .footer-link { margin-top: 20px; font-size: 0.85rem; opacity: 0.6; }
        .footer-link a { color: white; text-decoration: none; font-weight: 600; }
        @media (max-width: 480px) { .glass-card { padding: 30px 20px; } h2 { font-size: 1.6rem; } }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2>Create Profile</h2>
        <p>Set up your account to get started.</p>
        
        <form id="profileForm">
            <div class="input-group">
                <label>Display Name (Username)</label>
                <input type="text" id="username" placeholder="e.g. AlexCreator" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-glass" id="submitBtn">Next Step</button>
        </form>

        <div class="footer-link">
            Already have an account? <a href="login.html">Log In</a>
        </div>
    </div>

    <script>
        // Updated Firebase Config for Realtime Database
        const firebaseConfig = {
            apiKey: "AIzaSyDjcNWpd7-zN4l--bdz_6NviRUthNnbZ5U",
            authDomain: "linktree-a41ae.firebaseapp.com",
            databaseURL: "https://linktree-a41ae-default-rtdb.firebaseio.com/",
            projectId: "linktree-a41ae",
            storageBucket: "linktree-a41ae.firebasestorage.app",
            messagingSenderId: "829854289113",
            appId: "1:829854289113:web:e625d84c546ed06b18c2c8"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const email = document.getElementById('email').value.trim().toLowerCase();
            const username = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (pass !== confirmPass) {
                alert("Passwords do not match!");
                return;
            }

            submitBtn.innerText = "Creating Account...";
            submitBtn.disabled = true;

            try {
                // 1. UNIQUE USERNAME CHECK (Realtime Database Check)
                const snapshot = await database.ref('users').orderByChild('username').equalTo(username).once('value');
                if (snapshot.exists()) {
                    alert("This username is already taken. Please choose another.");
                    submitBtn.innerText = "Next Step";
                    submitBtn.disabled = false;
                    return;
                }

                // 2. CREATE ACCOUNT IN FIREBASE AUTH
                const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                const user = userCredential.user;

                // 3. SAVE PROFILE TO REALTIME DATABASE
                await database.ref('users/' + user.uid).set({
                    username: username,
                    email: email,
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });

                // 4. Update Local Session & Redirect
                localStorage.setItem('tempUsername', username);
                localStorage.setItem('isLoggedIn', 'true');
                
                // Final Redirect
                window.location.href = 'styles.html';

            } catch (error) {
                alert("Signup failed: " + error.message);
                submitBtn.innerText = "Next Step";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
