<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=USD"></script>

    <style>
        :root {
            --accent: #00dbde;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.15);
            --danger: #ff4d4d;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: row; /* Default side-by-side */
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: 250px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            flex-shrink: 0;
            transition: 0.3s;
        }

        .sidebar h2 { font-size: 1.2rem; margin-bottom: 30px; opacity: 0.8; }

        .nav-item {
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.7);
            white-space: nowrap;
        }

        .nav-item:hover { background: var(--glass); color: white; }
        .nav-item.active { background: var(--glass); color: white; border-left: 4px solid var(--accent); }

        /* --- Main Content Area --- */
        .main-content {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        .settings-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 30px;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            display: none;
            box-sizing: border-box;
        }

        .settings-card.active { display: block; }

        /* --- RESPONSIVE BREAKPOINT (Mobile) --- */
        @media (max-width: 768px) {
            body {
                flex-direction: column; /* Stack sidebar on top of content */
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 15px;
                box-sizing: border-box;
                flex-direction: row; /* Make menu items horizontal */
                overflow-x: auto; /* Allow scrolling if many items */
                gap: 10px;
            }

            .sidebar h2 { display: none; } /* Hide title on mobile to save space */

            .nav-item {
                margin-bottom: 0;
                padding: 10px 15px;
                font-size: 0.85rem;
            }

            .nav-item.active {
                border-left: none;
                border-bottom: 3px solid var(--accent);
            }

            .main-content {
                padding: 20px;
            }

            .settings-card {
                padding: 20px;
                border-radius: 20px;
            }
        }

        /* (Rest of your original styles like .profile-avatar, .btn-action, etc. stay the same) */
        .profile-avatar { width: 120px; height: 120px; margin: 0 auto 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: linear-gradient(45deg, #00dbde, #fc00ff); font-size: 50px; font-weight: 800; text-transform: uppercase; cursor: pointer; position: relative; overflow: hidden; border: 3px solid transparent; transition: 0.3s; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; opacity: 0.7; }
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 10px; color: white; box-sizing: border-box; outline: none; }
        .btn-action { background: var(--accent); color: #0f0c29; border: none; padding: 15px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; transition: transform 0.2s; }
        .btn-action.danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); margin-top: 20px; }
        .btn-action.danger:hover { background: var(--danger); color: white; }
        .plan-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px dashed var(--border); margin-top: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Settings</h2>
    <div class="nav-item active" onclick="switchTab('profile', this)"><i class="fa-solid fa-user"></i> Profile</div>
    <div class="nav-item" onclick="switchTab('account', this)"><i class="fa-solid fa-envelope"></i> Email</div>
    <div class="nav-item" onclick="switchTab('payments', this)"><i class="fa-solid fa-credit-card"></i> Pay</div>
    <div class="nav-item" onclick="switchTab('privacy', this)"><i class="fa-solid fa-shield-halved"></i> Data</div>
    
    <div class="nav-item" onclick="logoutUser()" style="margin-top: auto; color: var(--danger);"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</div>
</div>

<div class="main-content">
    <div id="profile" class="settings-card active">
        <h3>Profile Settings</h3>
        <label for="pfpInput">
            <div id="userInitialCircle" class="profile-avatar">?</div>
            <input type="file" id="pfpInput" accept="image/*" style="display: none;" onchange="uploadPFP(this)">
        </label>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="usernameInput" placeholder="Loading name...">
        </div>
        <button class="btn-action" onclick="saveUsername()">Update Username</button>
    </div>

    </div>

<script>
    // Your Firebase, Tab Switching, and PayPal JS code goes here
    // (Everything from your original <script> tag)
    
    function switchTab(tabId, element) {
        document.querySelectorAll('.settings-card').forEach(card => card.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }
</script>
</body>
</html>
