<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .settings-container {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
        }

        .profile-upload {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            padding: 6px;
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 219, 222, 0.4);
        }

        .profile-upload:hover { transform: scale(1.05); }

        #profileImage {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #222;
            display: block;
        }

        .status-msg {
            font-size: 0.95rem;
            font-weight: 700;
            margin-top: 20px;
            min-height: 1.5em;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .btn-home {
            position: absolute;
            top: 20px;
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-home:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<a href="index.html" class="btn-home"><i class="fa-solid fa-house"></i> Home</a>

<div class="settings-container">
    <h2>Profile Picture</h2>
    <p style="opacity: 0.7; font-size: 0.9rem; margin-bottom: 25px;">Click the image to upload and save automatically</p>

    <div class="profile-upload" onclick="document.getElementById('autoFileInput').click()">
        <img id="profileImage" src="https://via.placeholder.com/150" alt="Profile">
        <input type="file" id="autoFileInput" style="display: none;" accept="image/*" onchange="handleImageUpdate(this)">
    </div>

    <div id="uploadStatus" class="status-msg"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDjcNWpd7-zN4l--bdz_6NviRUthNnbZ5U",
        authDomain: "linktree-a41ae.firebaseapp.com",
        projectId: "linktree-a41ae",
        storageBucket: "linktree-a41ae.firebasestorage.app",
        messagingSenderId: "829854289113",
        appId: "1:829854289113:web:e625d84c546ed06b18c2c8"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    let unsubscribe = null;

    // REAL-TIME LISTENER: This ensures the image is ALWAYS correct and updates instantly
    auth.onAuthStateChanged((user) => {
        if (user) {
            // Listen to database changes in real-time
            if (unsubscribe) unsubscribe();
            unsubscribe = db.collection('users').doc(user.uid).onSnapshot((doc) => {
                if (doc.exists && doc.data().profilePic) {
                    const newUrl = doc.data().profilePic;
                    // Force the image to update on the website
                    document.getElementById('profileImage').src = newUrl;
                }
            }, (error) => console.error("Snapshot error:", error));
        } else {
            window.location.href = 'index.html';
        }
    });

    async function handleImageUpdate(input) {
        const file = input.files[0];
        const user = auth.currentUser;
        const status = document.getElementById('uploadStatus');

        if (!file || !user) return;

        try {
            status.style.color = "#00dbde";
            status.innerText = "Saving to Database...";

            // 1. Upload file to Storage (using a fixed path so it overwrites/updates)
            const storageRef = storage.ref(`profiles/${user.uid}/profile_picture`);
            const snapshot = await storageRef.put(file);
            
            // 2. Get the permanent URL
            const downloadURL = await snapshot.ref.getDownloadURL();

            // 3. Update Firestore with the permanent link
            // This triggers the 'onSnapshot' listener above automatically
            await db.collection('users').doc(user.uid).set({
                profilePic: downloadURL,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });

            status.style.color = "#00ffcc";
            status.innerText = "✅ Profile Picture Saved Successfully!";

            setTimeout(() => { status.innerText = ""; }, 4000);

        } catch (error) {
            console.error(error);
            status.style.color = "#ff4d4d";
            status.innerText = "Error saving: " + error.message;
        }
    }
</script>

</body>
</html>
