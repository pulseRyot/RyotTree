<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Modern</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: linear-gradient(45deg, #ff00cc, #3333ff);
            --danger: #ff4d4d;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .settings-container {
            width: 100%;
            max-width: 600px;
        }

        /* --- Header --- */
        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .settings-header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #ffffff, #b0b0b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            text-decoration: none;
            color: white;
            background: var(--glass);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(-5px);
        }

        /* --- Glass Cards --- */
        .settings-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h2 { 
            margin-top: 0; 
            font-size: 1.1rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            opacity: 0.8;
            margin-bottom: 20px;
        }

        /* --- Profile Section --- */
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            padding: 4px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 0, 204, 0.3);
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #1a1a1a;
        }

        /* --- Plan Grid --- */
        .plan-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .plan-option input { display: none; }

        .plan-content {
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.02);
        }

        .plan-option input:checked + .plan-content {
            background: var(--accent);
            border-color: transparent;
            transform: scale(1.05);
        }

        /* --- Buttons --- */
        .btn {
            cursor: pointer;
            border: none;
            border-radius: 14px;
            padding: 15px 25px;
            font-weight: 700;
            width: 100%;
            transition: 0.3s ease;
            font-family: inherit;
        }

        .btn-primary { 
            background: white; 
            color: #0f0c29; 
            margin-top: 20px;
        }
        
        .btn-secondary { 
            background: var(--glass); 
            color: white; 
            border: 1px solid var(--glass-border); 
        }

        .btn-danger { 
            background: transparent; 
            color: var(--danger); 
            border: 1px solid rgba(255, 77, 77, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .small-text { font-size: 0.85rem; opacity: 0.5; margin-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="settings-container">
    <div class="settings-header">
        <h1>Settings</h1>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Home</a>
    </div>

    <section class="settings-card">
        <h2>Profile Identity</h2>
        <div class="profile-section">
            <div class="avatar-preview">
                <img src="https://via.placeholder.com/120" id="avatarImg" alt="Profile">
            </div>
            <input type="file" id="profileInput" accept="image/*" hidden>
            <button class="btn btn-secondary" onclick="document.getElementById('profileInput').click()">
                <i class="fas fa-camera"></i> Change Photo
            </button>
        </div>
        <button id="saveProfile" class="btn btn-primary">Save Changes</button>
    </section>

    <section class="settings-card">
        <h2>Subscription Plan</h2>
        <div class="plan-grid">
            <label class="plan-option">
                <input type="radio" name="plan" value="free" checked>
                <div class="plan-content">
                    <div style="font-size: 0.9rem; opacity: 0.7;">Basic</div>
                    <strong>Free</strong>
                </div>
            </label>
            <label class="plan-option">
                <input type="radio" name="plan" value="pro">
                <div class="plan-content">
                    <div style="font-size: 0.9rem; opacity: 0.7;">Premium</div>
                    <strong>$9.99</strong>
                </div>
            </label>
        </div>
    </section>

    <section class="settings-card">
        <h2>Account Security</h2>
        <p class="small-text">Managing your data and account visibility.</p>
        <div style="margin-top: 25px; border-top: 1px solid var(--glass-border); padding-top: 25px;">
            <button id="deleteAccount" class="btn btn-danger">Delete Account</button>
            <p class="small-text"><i class="fas fa-exclamation-triangle"></i> This action is irreversible. All your LinkTree data will be deleted.</p>
        </div>
    </section>
</div>

<script>
    // Config matches your reference
    const firebaseConfig = {
        apiKey: "AIzaSyDjcNWpd7-zN4l--bdz_6NviRUthNnbZ5U",
        authDomain: "linktree-a41ae.firebaseapp.com",
        projectId: "linktree-a41ae",
        storageBucket: "linktree-a41ae.firebasestorage.app",
        messagingSenderId: "829854289113",
        appId: "1:829854289113:web:e625d84c546ed06b18c2c8"
    };

    // Initialize using Compat API
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    const profileInput = document.getElementById('profileInput');
    const avatarImg = document.getElementById('avatarImg');
    const saveBtn = document.getElementById('saveProfile');
    const deleteBtn = document.getElementById('deleteAccount');

    // Preview
    profileInput.onchange = () => {
        const [file] = profileInput.files;
        if (file) avatarImg.src = URL.createObjectURL(file);
    };

    // Save Logic (using Compat Syntax)
    saveBtn.onclick = async () => {
        const file = profileInput.files[0];
        const user = auth.currentUser;

        if (!user) return alert("Please log in first");
        if (!file) return alert("Select an image first");

        try {
            saveBtn.innerText = "Uploading...";
            const storageRef = storage.ref(`profiles/${user.uid}`);
            
            // 1. Upload
            await storageRef.put(file);
            const url = await storageRef.getDownloadURL();

            // 2. Update Firestore
            await db.collection('users').doc(user.uid).set({
                profilePic: url
            }, { merge: true });

            alert("Profile updated successfully!");
        } catch (e) {
            console.error(e);
            alert("Error: " + e.message);
        } finally {
            saveBtn.innerText = "Save Changes";
        }
    };

    // Delete Logic
    deleteBtn.onclick = async () => {
        if (confirm("Are you sure? This will delete your entire tree.")) {
            const user = auth.currentUser;
            try {
                await db.collection('users').doc(user.uid).delete();
                await user.delete();
                window.location.href = "index.html";
            } catch (e) {
                alert("Please log in again to delete your account.");
            }
        }
    };
</script>
</body>
</html>
