<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Modern</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: linear-gradient(45deg, #ff00cc, #3333ff);
            --danger: #ff4d4d;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .settings-container {
            width: 100%;
            max-width: 600px;
        }

        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .settings-header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to bottom, #ffffff, #b0b0b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            text-decoration: none;
            color: white;
            background: var(--glass);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            font-size: 14px;
            transition: 0.3s;
        }

        .settings-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 25px;
        }

        h2 { font-size: 1.1rem; text-transform: uppercase; opacity: 0.8; margin-bottom: 20px; }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            padding: 4px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #1a1a1a;
        }

        .input-group {
            width: 100%;
            margin-top: 15px;
        }

        .input-group label { display: block; font-size: 0.8rem; margin-bottom: 5px; opacity: 0.7; }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
        }

        .plan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .plan-option input { display: none; }
        .plan-content {
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .plan-option input:checked + .plan-content { background: var(--accent); border-color: transparent; }

        .btn {
            cursor: pointer;
            border: none;
            border-radius: 14px;
            padding: 15px 25px;
            font-weight: 700;
            width: 100%;
            transition: 0.3s ease;
        }

        .btn-primary { background: white; color: #0f0c29; margin-top: 20px; }
        .btn-secondary { background: var(--glass); color: white; border: 1px solid var(--glass-border); }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(255, 77, 77, 0.3); }
        .btn-danger:hover { background: var(--danger); color: white; }
        .small-text { font-size: 0.85rem; opacity: 0.5; margin-top: 15px; }
    </style>
</head>
<body>

<div class="settings-container">
    <div class="settings-header">
        <h1>Settings</h1>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Home</a>
    </div>

    <section class="settings-card">
        <h2>Profile Identity</h2>
        <div class="profile-section">
            <div class="avatar-preview">
                <img src="https://via.placeholder.com/120" id="avatarImg" alt="Profile">
            </div>
            <input type="file" id="profileInput" accept="image/*" hidden>
            <button class="btn btn-secondary" onclick="document.getElementById('profileInput').click()">
                <i class="fas fa-camera"></i> Change Photo
            </button>
            
            <div class="input-group">
                <label>Display Name</label>
                <input type="text" id="usernameInput" placeholder="Enter your name">
            </div>
        </div>
        <button id="saveProfile" class="btn btn-primary">Save Changes</button>
    </section>

    <section class="settings-card">
        <h2>Subscription Plan</h2>
        <div class="plan-grid">
            <label class="plan-option">
                <input type="radio" name="plan" value="free" checked>
                <div class="plan-content"><div>Basic</div><strong>Free</strong></div>
            </label>
            <label class="plan-option">
                <input type="radio" name="plan" value="pro">
                <div class="plan-content"><div>Premium</div><strong>$9.99</strong></div>
            </label>
        </div>
    </section>

    <section class="settings-card">
        <h2>Account Security</h2>
        <div style="border-top: 1px solid var(--glass-border); padding-top: 20px;">
            <button id="deleteAccount" class="btn btn-danger">Delete Account</button>
            <p class="small-text">This will erase your entire LinkTree presence.</p>
        </div>
    </section>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDjcNWpd7-zN4l--bdz_6NviRUthNnbZ5U",
        authDomain: "linktree-a41ae.firebaseapp.com",
        projectId: "linktree-a41ae",
        storageBucket: "linktree-a41ae.firebasestorage.app",
        messagingSenderId: "829854289113",
        appId: "1:829854289113:web:e625d84c546ed06b18c2c8"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    const profileInput = document.getElementById('profileInput');
    const avatarImg = document.getElementById('avatarImg');
    const usernameInput = document.getElementById('usernameInput');
    const saveBtn = document.getElementById('saveProfile');

    // --- NEW: AUTO-LOAD PROFILE DATA ---
    auth.onAuthStateChanged((user) => {
        if (user) {
            db.collection('users').doc(user.uid).get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.profilePic) avatarImg.src = data.profilePic;
                    if (data.username) usernameInput.value = data.username;
                }
            });
        }
    });

    // Preview
    profileInput.onchange = () => {
        const [file] = profileInput.files;
        if (file) avatarImg.src = URL.createObjectURL(file);
    };

    // Save Logic
    saveBtn.onclick = async () => {
        const file = profileInput.files[0];
        const user = auth.currentUser;
        const newUsername = usernameInput.value;

        if (!user) return alert("Please log in first");

        try {
            saveBtn.innerText = "Saving...";
            let updateData = { username: newUsername };

            // If a new file was selected, upload it
            if (file) {
                const storageRef = storage.ref(`profiles/${user.uid}`);
                await storageRef.put(file);
                const url = await storageRef.getDownloadURL();
                updateData.profilePic = url;
            }

            // Save to Firestore (Merge ensures we don't delete existing links)
            await db.collection('users').doc(user.uid).set(updateData, { merge: true });

            alert("Settings saved!");
        } catch (e) {
            console.error(e);
            alert("Error: " + e.message);
        } finally {
            saveBtn.innerText = "Save Changes";
        }
    };

    document.getElementById('deleteAccount').onclick = async () => {
        if (confirm("Delete permanently?")) {
            const user = auth.currentUser;
            await db.collection('users').doc(user.uid).delete();
            await user.delete().then(() => window.location.href = "index.html");
        }
    };
</script>
</body>
</html>
