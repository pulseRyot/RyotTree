<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="https://www.paypal.com/sdk/js?client-id=AW4tndx1MYKJICurzlrKFSlpP4bqAa8uzL-LbG175kfgr3QOlD-Dg2jc8scOGSU5VTC_Uxfg1IFmf-DQ=USD"></script>

    <style>
        :root {
            --accent: #00dbde;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.15);
            --danger: #ff4d4d;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: 250px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
        }

        .sidebar h2 { font-size: 1.1rem; margin-top: 20px; margin-bottom: 20px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

        .nav-item {
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.7);
        }

        .nav-item:hover { background: var(--glass); color: white; }
        .nav-item.active { background: var(--glass); color: white; border-left: 4px solid var(--accent); }

        .home-btn { color: var(--accent) !important; font-weight: bold; margin-bottom: 5px; }

        /* --- Mobile Bottom Nav (Hidden by Default) --- */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 12, 41, 0.9);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--border);
            padding: 15px;
            text-align: center;
            z-index: 1000;
        }

        /* --- Main Content Area --- */
        .main-content {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        .settings-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 30px;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            display: none;
            box-sizing: border-box;
        }

        .settings-card.active { display: block; }

        .profile-avatar {
            width: 120px;
            height: 120px;
            margin: 0 auto 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            font-size: 50px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 3px solid transparent;
            transition: 0.3s;
        }

        .profile-avatar:hover { border-color: var(--accent); }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        #proBadge {
            display: none;
            background: gold;
            color: black;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            width: fit-content;
            margin: 0 auto 15px;
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; opacity: 0.7; }
        
        input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .btn-action {
            background: var(--accent);
            color: #0f0c29;
            border: none;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        .btn-action.danger {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            margin-top: 20px;
        }

        .btn-action.danger:hover { background: var(--danger); color: white; }
        .status-msg { font-size: 0.85rem; margin-top: 15px; text-align: center; min-height: 1.2rem; color: var(--accent); }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; 
                flex-direction: row; 
                overflow-x: auto; 
                padding: 10px; 
                border-right: none; 
                border-bottom: 1px solid var(--border);
                box-sizing: border-box;
            }
            .sidebar h2, .sidebar hr, .sidebar .home-btn { display: none; } /* Hide Home and Headers in sidebar on mobile */
            .sidebar .nav-item { margin-bottom: 0; white-space: nowrap; font-size: 0.8rem; }
            .mobile-nav { display: block; } /* Show Bottom Home Button */
            .main-content { padding: 20px; padding-bottom: 80px; } /* Space for bottom nav */
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="nav-item home-btn" onclick="window.location.href='index.html'">
        <i class="fa-solid fa-house"></i> Home
    </div>
    <hr style="border: 0; border-top: 1px solid var(--border); width: 100%; margin: 10px 0;">
    
    <h2>Settings</h2>
    <div class="nav-item active" onclick="switchTab('profile', this)"><i class="fa-solid fa-user"></i> Profile</div>
    <div class="nav-item" onclick="switchTab('account', this)"><i class="fa-solid fa-envelope"></i> Account</div>
    <div class="nav-item" onclick="switchTab('payments', this)"><i class="fa-solid fa-credit-card"></i> Payments</div>
    <div class="nav-item" onclick="switchTab('privacy', this)"><i class="fa-solid fa-shield-halved"></i> Privacy</div>
    
    <div class="nav-item" onclick="logoutUser()" style="margin-top: auto; color: var(--danger);"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</div>
</div>

<div class="mobile-nav">
    <div class="nav-item home-btn" onclick="window.location.href='index.html'" style="justify-content: center; margin: 0 auto;">
        <i class="fa-solid fa-house"></i> Back to Home
    </div>
</div>

<div class="main-content">
    <div id="profile" class="settings-card active">
        <h3>Profile Settings</h3>
        <label for="pfpInput">
            <div id="userInitialCircle" class="profile-avatar">?</div>
            <input type="file" id="pfpInput" accept="image/*" style="display: none;" onchange="uploadPFP(this)">
        </label>
        <div id="proBadge">PRO</div>
        <p style="text-align: center; font-size: 0.8rem; opacity: 0.5; margin-bottom: 20px;">Click photo to change</p>

        <div class="input-group">
            <label>Username</label>
            <input type="text" id="usernameInput" placeholder="Loading name...">
        </div>
        <button class="btn-action" onclick="saveUsername()">Update Username</button>
        <div id="saveStatus" class="status-msg"></div>
    </div>

    <div id="account" class="settings-card">
        <h3>Account Email</h3>
        <p style="opacity: 0.7; font-size: 0.9rem;">Current: <span id="currentEmailDisplay" style="color: var(--accent);">...</span></p>
        <div class="input-group">
            <label>New Email Address</label>
            <input type="email" id="newEmailInput" placeholder="newemail@example.com">
        </div>
        <button class="btn-action" onclick="updateEmail()">Update Email</button>
    </div>

    <div id="payments" class="settings-card">
        <h3>Payments & Billing</h3>
        <div class="plan-box">
            <p style="margin: 0;"><strong>Status:</strong> <span id="planName" style="color: var(--accent);">Free Member</span></p>
        </div>
        <div id="pay-area" style="margin-top: 30px; text-align: center;">
            <p style="margin-bottom: 20px;">Upgrade to <strong>PRO</strong> for $5.00/mo</p>
            <div id="paypal-button-container"></div>
        </div>
    </div>

    <div id="privacy" class="settings-card">
        <h3>Privacy & Data</h3>
        <p style="font-size: 0.9rem; opacity: 0.8;">Your data is secured by Firebase Encryption.</p>
        <hr style="border: 0; border-top: 1px solid var(--border); margin: 30px 0;">
        <h3 style="color: var(--danger);">Danger Zone</h3>
        <button class="btn-action danger" onclick="deleteAccount()">Delete My Account</button>
    </div>
</div>

<script>
    // Config stays the same
    const firebaseConfig = {
        apiKey: "AIzaSyDjcNWpd7-zN4l--bdz_6NviRUthNnbZ5U",
        authDomain: "linktree-a41ae.firebaseapp.com",
        projectId: "linktree-a41ae",
        storageBucket: "linktree-a41ae.firebasestorage.app",
        messagingSenderId: "829854289113",
        appId: "1:829854289113:web:e625d84c546ed06b18c2c8"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    function switchTab(tabId, element) {
        document.querySelectorAll('.settings-card').forEach(card => card.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        element.classList.add('active');
    }

    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('currentEmailDisplay').innerText = user.email;
            db.collection('users').doc(user.uid).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    const circle = document.getElementById('userInitialCircle');
                    if (data.username) {
                        document.getElementById('usernameInput').value = data.username;
                        if (!data.profilePic) circle.innerText = data.username.charAt(0).toUpperCase();
                    }
                    if (data.profilePic) {
                        circle.innerHTML = `<img src="${data.profilePic}">`;
                        circle.style.background = "none";
                    }
                    if (data.isPro) {
                        document.getElementById('planName').innerText = "Pro Member";
                        document.getElementById('proBadge').style.display = "block";
                        document.getElementById('pay-area').style.display = "none";
                    }
                }
            });
        } else {
            window.location.href = 'index.html';
        }
    });

    function uploadPFP(input) {
        const file = input.files[0];
        if (!file) return;
        if (file.size > 800000) {
            alert("Photo too large! Please keep it under 800KB.");
            return;
        }
        const status = document.getElementById('saveStatus');
        status.innerText = "Saving...";
        const reader = new FileReader();
        reader.onloadend = async function() {
            const base64String = reader.result;
            try {
                await db.collection('users').doc(auth.currentUser.uid).set({ profilePic: base64String }, { merge: true });
                status.innerText = "Photo Saved!";
            } catch (e) { status.innerText = "Error saving."; }
        };
        reader.readAsDataURL(file);
    }

    async function saveUsername() {
        const name = document.getElementById('usernameInput').value.trim();
        if (!name) return;
        const status = document.getElementById('saveStatus');
        status.innerText = "Saving...";
        await db.collection('users').doc(auth.currentUser.uid).set({ username: name }, { merge: true });
        status.innerText = "Saved!";
        setTimeout(() => status.innerText = "", 2000);
    }

    function logoutUser() {
        if (confirm("Sign out?")) auth.signOut().then(() => window.location.href = 'index.html');
    }

    async function updateEmail() {
        const newEmail = document.getElementById('newEmailInput').value.trim();
        if (newEmail) {
            try {
                await auth.currentUser.updateEmail(newEmail);
                alert("Email updated! Log in again.");
                auth.signOut();
            } catch (e) { alert(e.message); }
        }
    }

    async function deleteAccount() {
        if (confirm("Delete account?")) {
            const user = auth.currentUser;
            await db.collection('users').doc(user.uid).delete();
            await user.delete().catch(() => alert("Please re-authenticate."));
            window.location.href = 'index.html';
        }
    }

    paypal.Buttons({
        createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: '5.00' } }] }),
        onApprove: (data, actions) => actions.order.capture().then(async () => {
            await db.collection('users').doc(auth.currentUser.uid).set({ isPro: true, plan: 'Pro' }, { merge: true });
            alert("Welcome to Pro!");
        })
    }).render('#paypal-button-container');
</script>
</body>
</html>
