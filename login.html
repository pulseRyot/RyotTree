<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LinkTree</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        .back-link {
            display: block;
            text-align: left;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-link:hover { color: white; transform: translateX(-3px); }
        h2 { margin-top: 0; font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; margin-bottom: 8px; display: block; opacity: 0.8; }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.5); }

        .btn-glass {
            background: white;
            color: #0f0c29;
            padding: 15px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            border: none;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-glass:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2); }
        #statusMessage { font-size: 13px; font-weight: 600; margin-top: 15px; display: none; }
        .error { color: #ff4d4d; animation: shake 0.4s ease; }
        .success { color: #4eff91; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .footer-link { margin-top: 25px; font-size: 0.85rem; opacity: 0.6; }
        .footer-link a { color: white; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

    <div class="glass-card">
        <a href="index.html" class="back-link">← Home</a>
        <h2 id="loginTitle">Welcome Back</h2>
        <p style="opacity: 0.7; margin-bottom: 30px;">Log in to manage your link tree.</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Email or Username</label>
                <input type="text" id="identifier" placeholder="Enter details" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="loginBtn" class="btn-glass">Log In</button>
            <div id="statusMessage"></div>
        </form>

        <div class="footer-link">
            Don't have an account? <a href="profile.html">Sign Up</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDjcNWpd7-zN4l--bdz_6NviRUthNnbZ5U",
            authDomain: "linktree-a41ae.firebaseapp.com",
            databaseURL: "https://linktree-a41ae-default-rtdb.firebaseio.com/",
            projectId: "linktree-a41ae",
            storageBucket: "linktree-a41ae.firebasestorage.app",
            messagingSenderId: "829854289113",
            appId: "1:829854289113:web:e625d84c546ed06b18c2c8"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const identifier = document.getElementById('identifier').value.trim();
            const pass = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.innerText = "Authenticating...";
            loginBtn.disabled = true;

            let email = identifier;

            try {
                // 1. If it's a Username, find the associated Email
                if (!identifier.includes('@')) {
                    const snapshot = await database.ref('users').orderByChild('username').equalTo(identifier).once('value');
                    if (!snapshot.exists()) {
                        throw new Error("Username not found.");
                    }
                    // Get email from the first matching user
                    const userData = Object.values(snapshot.val())[0];
                    email = userData.email;
                }

                // 2. Perform Firebase Auth Sign In
                const userCredential = await auth.signInWithEmailAndPassword(email, pass);
                const user = userCredential.user;

                // 3. Get the correct username for display
                const userSnap = await database.ref('users/' + user.uid).once('value');
                const username = userSnap.exists() ? userSnap.val().username : "User";

                // Success
                showMessage("Success! Redirecting...", "success");
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('tempUsername', username);

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 800);

            } catch (error) {
                showMessage("Login failed: " + error.message, "error");
                loginBtn.innerText = "Log In";
                loginBtn.disabled = false;
            }
        });

        function showMessage(text, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.innerText = text;
            statusDiv.className = type;
            statusDiv.style.display = "block";
        }
    </script>
</body>
</html>
