<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LinkTree</title>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        .back-link {
            display: block;
            text-align: left;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-link:hover { color: white; transform: translateX(-3px); }

        h2 { 
            margin-top: 0; 
            font-size: 2rem; 
            font-weight: 800;
            letter-spacing: -1px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            opacity: 0.8;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .btn-glass {
            background: white;
            color: #0f0c29;
            padding: 15px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            border: none;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-glass:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        /* --- Message Styling --- */
        #statusMessage {
            font-size: 13px;
            font-weight: 600;
            margin-top: 15px;
            display: none; 
        }

        .error { color: #ff4d4d; animation: shake 0.4s ease; }
        .success { color: #4eff91; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .footer-link {
            margin-top: 25px;
            font-size: 0.85rem;
            opacity: 0.6;
        }

        .footer-link a {
            color: white;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <a href="index.html" class="back-link">← Home</a>
        
        <h2 id="loginTitle">Welcome Back</h2>
        <p style="opacity: 0.7; margin-bottom: 30px;">Log in to manage your link tree.</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Email or Username</label>
                <input type="text" id="identifier" placeholder="Enter details" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" id="loginBtn" class="btn-glass">Log In</button>
            <div id="statusMessage"></div>
        </form>

        <div class="footer-link">
            Don't have an account? <a href="profile.html">Sign Up</a>
        </div>
    </div>

    <script>
        // On load, check if there's an offline user saved
        window.onload = function() {
            const savedUser = localStorage.getItem('tempUsername');
            if (savedUser) {
                document.getElementById('loginTitle').innerText = "Hi, " + savedUser;
                document.getElementById('identifier').value = savedUser;
            }
        };

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const enteredPass = document.getElementById('password').value;
            const enteredUser = document.getElementById('identifier').value;
            const statusDiv = document.getElementById('statusMessage');
            
            // 1. Pull the data from the device's offline storage
            const storedPass = localStorage.getItem('tempUserPassword');
            const storedUser = localStorage.getItem('tempUsername');
            const storedEmail = localStorage.getItem('tempUserEmail');

            // 2. ERROR LOGIC:
            // Check if account exists on this device
            if (!storedPass) {
                showMessage("No account found on this device. Please sign up.", "error");
                return;
            }

            // Check if the username/email matches AND the password matches
            const isUserValid = (enteredUser === storedUser || enteredUser === storedEmail);
            
            if (!isUserValid || enteredPass !== storedPass) {
                showMessage("Invalid credentials. Please try again.", "error");
                return; 
            }

            // 3. SUCCESS LOGIC
            showMessage("Logging you in...", "success");
            
            localStorage.setItem('isLoggedIn', 'true');
            // Ensure the latest identifier used is saved as the display name
            localStorage.setItem('tempUsername', storedUser); 
            
            // Short delay for the "Success" feel
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 800);
        });

        function showMessage(text, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.innerText = text;
            statusDiv.className = type; // Adds 'error' or 'success' class
            statusDiv.style.display = "block";

            if (type === 'error') {
                statusDiv.style.animation = 'none';
                statusDiv.offsetHeight; /* trigger reflow */
                statusDiv.style.animation = null; 
            }
        }
    </script>

</body>
</html>
