<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1: Auth</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        /* ... existing styles remain the same ... */
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
        }

        .back-link {
            display: block;
            text-align: left;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-link:hover { color: white; transform: translateX(-3px); }
        h2 { margin-top: 0; font-size: 1.8rem; letter-spacing: -0.5px; }
        p { opacity: 0.8; font-size: 1rem; margin-bottom: 10px; }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin: 20px 0;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 30px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-glass:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="glass-card">
        <a href="index.html" class="back-link">← Back to Home</a>

        <h2 id="statusTitle">Verify Identity</h2>
        <p id="statusDesc">Enter your Gmail to continue.</p>
        
        <div id="inputContainer">
            <input type="email" id="email" placeholder="email@gmail.com">
            <button class="btn-glass" onclick="nextPage()">Continue</button>
        </div>
    </div>

    <script>
        // --- Firebase Config (MUST MATCH YOUR LOGIN PAGE) ---
        const firebaseConfig = {
            apiKey: "AIzaSyDjcNWpd7-zN4l--bdz_6NviRUthNnbZ5U",
            authDomain: "linktree-a41ae.firebaseapp.com",
            projectId: "linktree-a41ae",
            storageBucket: "linktree-a41ae.firebasestorage.app",
            messagingSenderId: "829854289113",
            appId: "1:829854289113:web:e625d84c546ed06b18c2c8"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Check if user is already logged in via Firebase
        auth.onAuthStateChanged((user) => {
            if (user) {
                // USER HAS AN ACCOUNT & IS LOGGED IN
                const userEmail = user.email;
                
                // Update UI
                document.getElementById('statusTitle').innerText = "Account Found";
                document.getElementById('statusDesc').innerText = `Logged in as: ${userEmail}`;
                document.getElementById('inputContainer').style.display = "none";

                // Save to local storage for the next step and redirect
                localStorage.setItem('tempUserEmail', userEmail);
                localStorage.setItem('isLoggedIn', 'true');

                setTimeout(() => {
                    window.location.href = 'styles.html';
                }, 1200);
            }
        });

        function nextPage() {
            const val = document.getElementById('email').value.trim();
            if(val.includes('@gmail.com')) {
                localStorage.setItem('tempUserEmail', val);
                window.location.href = 'styles.html';
            } else { 
                alert("Please enter a valid Gmail address."); 
            }
        }
    </script>
</body>
</html>
