<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1: Auth</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-link:hover { color: white; }

        h2 { margin-top: 0; font-size: 1.8rem; letter-spacing: -0.5px; }
        p { opacity: 0.8; font-size: 1rem; margin-bottom: 20px; }

        #loggedOutView, #loggedInView {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 30px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
            margin-top: 10px;
            box-sizing: border-box;
        }

        .btn-glass:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }
        
        .btn-primary { background: white; color: #0f0c29; }
        .btn-primary:hover { background: #f0f0f0; }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 12px;
            color: white;
            margin-bottom: 10px;
            outline: none;
            text-align: center;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <a href="index.html" class="back-link">← Back to Home</a>

        <h2 id="statusTitle">Verify Identity</h2>
        <p id="statusDesc">Sign up to save your LinkTree progress.</p>
        
        <div id="loggedOutView">
            <button class="btn-glass btn-primary" onclick="window.location.href='profile.html'">Sign Up with Gmail</button>
            
            <div style="margin: 20px 0; opacity: 0.3;">OR</div>
            
            <input type="email" id="email" placeholder="Continue as guest (email@gmail.com)">
            <button class="btn-glass" onclick="guestNext()">Continue as Guest</button>
        </div>

        <div id="loggedInView" style="display: none;">
            <p id="userEmailDisplay" style="font-weight: 600; color: #4eff91;"></p>
            <button class="btn-glass btn-primary" onclick="proceed()">Continue to Styles</button>
            <button class="btn-glass" style="font-size: 12px; opacity: 0.6; background: none; border: none; box-shadow: none;" onclick="firebase.auth().signOut().then(() => location.reload())">Switch Account</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDjcNWpd7-zN4l--bdz_6NviRUthNnbZ5U",
            authDomain: "linktree-a41ae.firebaseapp.com",
            projectId: "linktree-a41ae",
            storageBucket: "linktree-a41ae.firebasestorage.app",
            messagingSenderId: "829854289113",
            appId: "1:829854289113:web:e625d84c546ed06b18c2c8"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        auth.onAuthStateChanged((user) => {
            const loggedOutView = document.getElementById('loggedOutView');
            const loggedInView = document.getElementById('loggedInView');
            const statusTitle = document.getElementById('statusTitle');
            const statusDesc = document.getElementById('statusDesc');

            if (user) {
                loggedOutView.style.display = "none";
                loggedInView.style.display = "flex";
                
                statusTitle.innerText = "Welcome Back";
                statusDesc.innerText = "You are currently signed in as:";
                document.getElementById('userEmailDisplay').innerText = user.email;

                localStorage.setItem('tempUserEmail', user.email);
                localStorage.setItem('isLoggedIn', 'true');
            } else {
                loggedOutView.style.display = "flex";
                loggedInView.style.display = "none";
            }
        });

        function guestNext() {
            const val = document.getElementById('email').value.trim();
            if(val.includes('@gmail.com')) {
                localStorage.setItem('tempUserEmail', val);
                localStorage.setItem('isLoggedIn', 'false');
                proceed();
            } else { 
                alert("Please enter a valid Gmail address to continue as guest."); 
            }
        }

        function proceed() {
            window.location.href = 'styles.html';
        }
    </script>
</body>
</html>
